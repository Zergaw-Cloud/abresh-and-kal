# Parent Blessings Registry Translation
familyRegistryNotes:
  parent-1:
    author: "የሙሽራው አባት ምርቃት"
    text: "ቃልኪዳንን ወደ ቤተሰባችን በመቀበላችን ታላቅ ደስታ ይሰማናል። ፍቅራችሁ የጽናት፣ የመከባበር እና የዘላቂ በረከት ማረጋገጫ ይሁን።"
    role: "የአቶ በላይሁን ከስክስ ምርቃት"
  parent-2:
    author: "የሙሽራው እናት ምርቃት"
    text: "ፈጣሪ ቤታችሁን በሰላም፣ በሳቅ እና በምክክር ይባርከው። ልባችሁን በአንድነት አጽኑ፤ ትዳራችሁን በቅንነት እና በሞገስ ገንቡ።"
    role: "የወይዘሮ አልማዝ አጥላው ምርቃት"
  parent-3:
    author: "የሙሽሪት እናት ምርቃት"
    text: "ልጄ ቃልኪዳን እና አብሩሃሴት ይህንን የተቀደሰ የህይወት ቃልኪዳን ሲገቡ በማየቴ ልቤ በደስታ ይፈሳል። ሁልጊዜም እርስ በርስ እየተከባበራችሁና እየተደጋገፋችሁ በጽናት ቁሙ።"
    role: "ወ/ሮ አለም ማሞ - ጎርፌ ምርቃት"

