  intro:
    title: "በፍቅር የታጀበ አሸንዳ"
    quote: '“አልፎ አልፎ፣ ከተለመደው የኑሮ መስመር መካከል፣ እውነተኛ ፍቅር ህይወትን የተዋበ ተረት ያደርገዋል።”'
    para1: "እጅግ የምንወዳችሁና የምናከብራችሁ ቤተሰቦቻችንና ወዳጆቻችን፣ የዘላለም ቃልኪዳናችንን ስንፈጽም አብራችሁን እንድትሰነብቱ በታላቅ አክብሮት እንጋብዛለን። አዲሱን የህይወት ምዕራፋችንን ስንጀምር መገኘታችሁ ትልቅ ደስታ ይሆንልናል።"
    readBtn: "የእኛን ታሪክ ያንብቡ"
    closeBtn: "ታሪኩን ዝጋ"
    photo1Caption: "እሺ ያለችበት ያ ውብ ቅጽበት"
    photo2Caption: "አስደሳች ጉዞ"
    modalTitle: "የመጀመሪያው መገናኛ እና የጥያቄው ሰዓት"
    modalBody1: "<strong>እንዴት እንደተገናኘን፦</strong> በአንድ በተጨናነቀ የቡና መሸጫ ካፌ ውስጥ ነበር ለመጀመሪያ ጊዜ የተያየነው። ስህተቱን በሳቅና በቀልድ ከተረዳን በኋላ በዚያኑ እለት ለሰዓታት አውግተናል። ያቺ የሻይና ቡና መደባለቅ የህይወታችን መጀመሪያ ሆነች።"
    modalBody2: "<strong>የጋብቻ ጥያቄ፦</strong> ጀንበር ሰማዩን ውብ በሆኑ ህብረ ቀለማት ስታስውበው፣ ተንበርክኮ የሚያምረውን ቀለበት አውጥቶ የህይወቷ አጋር እንድትሆን ጠየቃት። እሷም በደስታና በእንባ ታጅባ “መቶ ሺህ ጊዜ እሺ!” አለችው።"
    modalFooter: "“እንግዲህ የህይወት ዘመን ጉዞ በይፋ ተጀመረ።”"
